name: dm-responder
on:
  schedule:
    - cron: "30 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ig-agent
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q openai python-dotenv
      - name: respond to comments
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          DM_LINK: ${{ secrets.DM_LINK }}
        run: python dm_responder.py
      - name: persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "state: dm run"
          git pull --rebase && git push
      - name: telegram failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py --failure dm-responder
